name: Clipboard
options:
  bundleIdPrefix: com.clipboard
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  ClipboardCore:
    path: Core
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  ClipboardApp:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - Info.plist
    dependencies:
      - package: ClipboardCore
        product: ClipboardCore
      - package: Sparkle
        product: Sparkle
    info:
      path: App/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        CFBundleName: Clipboard
        CFBundleDisplayName: Clipboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "© 2026 Clipboard"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
          - zh-Hant
          - ja
          - ko
          - de
          - es
        # Per-arch appcast feed, injected at build time via SU_FEED_URL
        # (see Justfile `package`): arm64 -> appcast-arm64.xml, x86_64 ->
        # appcast-x86_64.xml. The legacy appcast.xml stays as a merged feed
        # for old <=1.0.4 installs still polling it.
        SUFeedURL: $(SU_FEED_URL)
        SUPublicEDKey: U4bGyKmbqkzf83bO2gau/85yVHIf1l+JNB4nK9ntUB8=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_NAME: Clipboard
        PRODUCT_BUNDLE_IDENTIFIER: com.clipboard.app
        MARKETING_VERSION: "1.0.5"
        CURRENT_PROJECT_VERSION: "7"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        # Default for `just build` / Xcode; release builds override it
        # per-arch from the Justfile.
        SU_FEED_URL: https://carter-ya.github.io/clipboard/appcast.xml
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
