<!DOCTYPE html>
<html lang="ko">
<head>

  <title>Clipboard 1.0.5</title>
  <style>
    body { font: 13px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Helvetica Neue", sans-serif; color: #1c1c1e; margin: 16px; line-height: 1.6; }

  <h1>Clipboard 1.0.5</h1>
