<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clipboard 1.0.5</title>
  <style>
    body { font: 13px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; color: #1c1c1e; margin: 16px; line-height: 1.5; }
    h1 { font-size: 16px; margin: 0 0 8px; }
    h2 { font-size: 11px; margin: 12px 0 4px; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.4px; }
    ul { margin: 4px 0 0; padding-left: 20px; }
    li { margin: 2px 0; }
    @media (prefers-color-scheme: dark) { body { color: #f2f2f7; background: transparent; } h2 { color: #98989d; } }
  </style>
</head>
<body>
  <h1>Clipboard 1.0.5</h1>
  <h2>What's new</h2>
  <ul>
    <li>Apple Silicon and Intel Macs now have separate downloads (an arm64 and an x86_64 DMG), so Intel Macs are supported.</li>
    <li>Each download carries only your Mac's architecture, so it's leaner, and auto-update follows the right build for your chip.</li>
  </ul>
</body>
</html>
