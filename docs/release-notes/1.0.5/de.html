<!DOCTYPE html>

<head>

  <title>Clipboard 1.0.5</title>
  <style>
    body { font: 13px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; color: #1c1c1e; margin: 16px; line-height: 1.5; }

<body>
  <h1>Clipboard 1.0.5</h1>
  <h2>Neu</h2>
  <ul>
    <li>Apple Silicon und Intel haben jetzt getrennte Downloads (eine arm64- und eine x86_64-DMG), sodass Intel-Macs unterstützt werden.</li>
    <li>Jeder Download enthält nur die Architektur deines Macs, ist dadurch schlanker, und das Auto-Update lädt den passenden Build für deinen Chip.</li>
  </ul>
