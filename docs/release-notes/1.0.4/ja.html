<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Clipboard 1.0.4</title>
  <style>
    body { font: 13px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", sans-serif; color: #1c1c1e; margin: 16px; line-height: 1.6; }
    h1 { font-size: 16px; margin: 0 0 8px; }
    h2 { font-size: 11px; margin: 12px 0 4px; color: #6e6e73; letter-spacing: 0.4px; }
    ul { margin: 4px 0 0; padding-left: 20px; }
    li { margin: 2px 0; }
    @media (prefers-color-scheme: dark) { body { color: #f2f2f7; background: transparent; } h2 { color: #98989d; } }
  </style>
</head>
<body>
  <h1>Clipboard 1.0.4</h1>
  <h2>修正</h2>
  <ul>
    <li>グローバルショートカットで確実にウィンドウを呼び出せるようになりました。アプリがアイドル状態のあと、最初の押下がまれに無反応になる問題を解消しました。</li>
    <li>設定の「件数の上限」と「最大サイズ」の入力欄が全体でクリックできるようになり、カーソルが安定し、クリック時に全選択されることもなくなりました。</li>
    <li>設定ウィンドウが配置した位置にとどまり、再表示時に移動しなくなりました。</li>
  </ul>
</body>
</html>
