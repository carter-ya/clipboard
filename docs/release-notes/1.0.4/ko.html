<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Clipboard 1.0.4</title>
  <style>
    body { font: 13px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Helvetica Neue", sans-serif; color: #1c1c1e; margin: 16px; line-height: 1.6; }
    h1 { font-size: 16px; margin: 0 0 8px; }
    h2 { font-size: 11px; margin: 12px 0 4px; color: #6e6e73; letter-spacing: 0.4px; }
    ul { margin: 4px 0 0; padding-left: 20px; }
    li { margin: 2px 0; }
    @media (prefers-color-scheme: dark) { body { color: #f2f2f7; background: transparent; } h2 { color: #98989d; } }
  </style>
</head>
<body>
  <h1>Clipboard 1.0.4</h1>
  <h2>수정</h2>
  <ul>
    <li>전역 단축키가 이제 안정적으로 창을 불러옵니다. 앱이 유휴 상태였다가 처음 누를 때 간혹 반응하지 않던 문제를 해결했습니다.</li>
    <li>설정의 '개수 제한'과 '최대 크기' 입력란을 이제 전체 영역에서 클릭할 수 있고, 커서가 안정적이며, 클릭 시 전체가 선택되지 않습니다.</li>
    <li>설정 창이 배치한 위치에 그대로 머물며 다시 열 때 이동하지 않습니다.</li>
  </ul>
</body>
</html>
