name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    # macos-26 ships Xcode 26 / macOS 26 SDK which is required to resolve
    # FoundationModels symbols at compile time. Runtime gating stays in
    # @available(macOS 26.0, *) so a single DMG runs on macOS 13+.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: |
          brew install just xcodegen swift-format create-dmg

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sanity check project.yml version matches tag
        run: |
          # Match only the settings-level assignment (indented, followed by ":"),
          # not the Info.plist interpolation `$(MARKETING_VERSION)`.
          FILE_VER=$(awk '/^[[:space:]]+MARKETING_VERSION:[[:space:]]/ {gsub(/[" ]/, "", $2); print $2; exit}' project.yml)
          if [[ "$FILE_VER" != "${{ steps.ver.outputs.version }}" ]]; then
            echo "::error::project.yml MARKETING_VERSION ($FILE_VER) != tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Verify localized release notes
        run: just release-notes-check "${{ steps.ver.outputs.version }}"

      - name: Run tests
        run: just test

      - name: Lint
        run: just lint

      - name: Package DMG
        run: just package

      - name: Sign updates and emit appcast items
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not configured. Generate with 'just sparkle-keys', store the private key, add it to repo Secrets, and put the matching public key into project.yml/SUPublicEDKey."
            exit 1
          fi
          VERSION="${{ steps.ver.outputs.version }}"
          # sign_update ships inside Sparkle's SPM binary artifact, populated
          # by 'just package' under each arch's derived-data dir. Search both
          # so the lookup never depends on which arch happened to use build/.
          SIGN_UPDATE=$(find build build-x86_64 -name sign_update -type f -not -path "*old_dsa_scripts*" 2>/dev/null | head -1)
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "::error::sign_update not found under build/ or build-x86_64/. Did 'just package' run?"
            exit 1
          fi
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          PUBDATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')
          # Sparkle semantics: shortVersionString = marketing (user-facing),
          # version = CFBundleVersion (build number used for comparison).
          # The build number is identical across arch slices (same project.yml),
          # so read it once from the arm64 build.
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" "build/Build/Products/Release/Clipboard.app/Contents/Info.plist")
          NOTES_BASE="https://carter-ya.github.io/clipboard/release-notes/${VERSION}"

          # One DMG + one appcast item per architecture. sign_update already
          # emits both sparkle:edSignature="..." and length="...", so we must
          # NOT append our own length=. Release-notes URLs point at GitHub
          # Pages; the release-notes-check step above guarantees all 7 exist.
          emit_item() {
            local ARCH="$1"
            local DMG="dist/Clipboard-${VERSION}-${ARCH}.dmg"
            local SIG_LINE
            SIG_LINE=$("$SIGN_UPDATE" -f "$KEY_FILE" "$DMG")
            local DMG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Clipboard-${VERSION}-${ARCH}.dmg"
            # arm64 carries a hardware requirement so the merged appcast.xml
            # filters it out on native Intel Macs. Harmless in the pure
            # appcast-arm64.xml feed, so we reuse one item body for both.
            local HWREQ=""
            if [[ "$ARCH" == "arm64" ]]; then
              HWREQ=$'\n                <sparkle:hardwareRequirements>arm64</sparkle:hardwareRequirements>'
            fi
          cat > "dist/appcast-item-${ARCH}.xml" <<ITEM
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUBDATE}</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>${HWREQ}
                <sparkle:releaseNotesLink xml:lang="en">${NOTES_BASE}/en.html</sparkle:releaseNotesLink>
                <sparkle:releaseNotesLink xml:lang="zh-Hans">${NOTES_BASE}/zh-Hans.html</sparkle:releaseNotesLink>
                <sparkle:releaseNotesLink xml:lang="zh-Hant">${NOTES_BASE}/zh-Hant.html</sparkle:releaseNotesLink>
                <sparkle:releaseNotesLink xml:lang="ja">${NOTES_BASE}/ja.html</sparkle:releaseNotesLink>
                <sparkle:releaseNotesLink xml:lang="ko">${NOTES_BASE}/ko.html</sparkle:releaseNotesLink>
                <sparkle:releaseNotesLink xml:lang="de">${NOTES_BASE}/de.html</sparkle:releaseNotesLink>
                <sparkle:releaseNotesLink xml:lang="es">${NOTES_BASE}/es.html</sparkle:releaseNotesLink>
                <enclosure url="${DMG_URL}" ${SIG_LINE} type="application/octet-stream" />
              </item>
          ITEM
          }
          emit_item arm64
          emit_item x86_64

          echo "## Appcast snippets" >> "$GITHUB_STEP_SUMMARY"
          for ARCH in arm64 x86_64; do
            echo "### ${ARCH}" >> "$GITHUB_STEP_SUMMARY"
            echo '```xml' >> "$GITHUB_STEP_SUMMARY"
            cat "dist/appcast-item-${ARCH}.xml" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Extract release notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag && /^\[[^]]+\]:/ {exit}
            flag {print}
          ' CHANGELOG.md > dist/release-notes.md
          cat .github/RELEASE_TEMPLATE.md dist/release-notes.md > dist/final-notes.md
          # Replace X.Y.Z placeholders in the template body
          sed -i '' "s/X\\.Y\\.Z/${VERSION}/g" dist/final-notes.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Clipboard-${{ steps.ver.outputs.version }}
          path: |
            dist/Clipboard-*.dmg
            dist/Clipboard-*.dmg.sha256
            dist/appcast-item-*.xml
            dist/final-notes.md

  release:
    # Runs on a native Intel runner so the x86_64 slice — cross-compiled on
    # the arm64 build runner and otherwise never executed — is launched
    # natively as a smoke gate before anything is published. The release and
    # appcast steps run only if that smoke test passes. macos-15-intel is the
    # free standard Intel image (the retired macos-13 never gets a runner).
    needs: build
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Clipboard-${{ steps.ver.outputs.version }}
          path: dist

      - name: Smoke-test the x86_64 DMG on native Intel
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="dist/Clipboard-${VERSION}-x86_64.dmg"
          # Guard: this gate is only meaningful on real Intel hardware. If a
          # future runner image flips this label to arm64, the x86_64 slice
          # would run under Rosetta and prove less — fail loudly instead.
          [[ "$(uname -m)" == "x86_64" ]] \
            || { echo "::error::Expected an Intel runner but uname -m=$(uname -m); smoke gate is not native."; exit 1; }

          MNT="$(mktemp -d)/mnt"
          hdiutil attach -nobrowse -readonly -noautoopen -mountpoint "$MNT" "$DMG"
          APP="$(mktemp -d)/Clipboard.app"
          ditto "$MNT/Clipboard.app" "$APP"
          hdiutil detach "$MNT" -quiet || true
          xattr -cr "$APP" || true

          # The slice must be thin x86_64 (no arm64), and must launch and stay
          # up natively — a broken cross-compile would crash on first launch.
          lipo -archs "$APP/Contents/MacOS/Clipboard"
          lipo -archs "$APP/Contents/MacOS/Clipboard" | tr ' ' '\n' | grep -qx x86_64
          open "$APP"
          sleep 8
          if ! pgrep -x Clipboard >/dev/null; then
            echo "::error::Clipboard (x86_64) did not stay running on Intel — it likely crashed on launch."
            exit 1
          fi
          osascript -e 'quit app "Clipboard"' 2>/dev/null || pkill -x Clipboard || true
          echo "x86_64 smoke test passed natively on $(uname -m)."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # Idempotent: if a release already exists at this tag (e.g. a
          # previous run succeeded partway), delete it first so we can
          # publish fresh artifacts. Keep the tag itself — it's what
          # triggered this run.
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release delete "v${VERSION}" --yes --cleanup-tag=false
          fi
          gh release create "v${VERSION}" \
            "dist/Clipboard-${VERSION}-arm64.dmg" "dist/Clipboard-${VERSION}-arm64.dmg.sha256" \
            "dist/Clipboard-${VERSION}-x86_64.dmg" "dist/Clipboard-${VERSION}-x86_64.dmg.sha256" \
            "dist/appcast-item-arm64.xml" "dist/appcast-item-x86_64.xml" \
            --title "Clipboard v${VERSION}" \
            --notes-file dist/final-notes.md

      - name: Publish appcasts to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # Stash the generated items; switching branches would lose dist/.
          ARM_TMP="$(mktemp)"; cp dist/appcast-item-arm64.xml "$ARM_TMP"
          X86_TMP="$(mktemp)"; cp dist/appcast-item-x86_64.xml "$X86_TMP"

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          # Drop the existing <item> carrying this exact DMG so re-runs
          # refresh instead of duplicating (a rebuilt DMG has a fresh
          # edSignature). Match on the enclosure filename — unique per
          # (version, arch) — via literal index(), not shortVersionString
          # (a marketing version can recur under several build numbers) and
          # not a regex (the dots in the version are not metacharacters here).
          strip_item() {
            local FEED="$1" DMG="$2"
            awk -v dmg="$DMG" '
              BEGIN { in_item = 0; buf = "" }
              /<item>/ { in_item = 1; buf = $0 ORS; next }
              in_item {
                buf = buf $0 ORS
                if ($0 ~ /<\/item>/) {
                  if (index(buf, dmg) == 0) printf "%s", buf
                  in_item = 0; buf = ""
                }
                next
              }
              { print }
            ' "$FEED" > "$FEED.stripped"
            mv "$FEED.stripped" "$FEED"
          }

          # Append one item before </channel>. Call order is preserved, which
          # matters for the merged feed: arm64 must precede the same-version
          # x86_64 item so Sparkle's "first of equal versions wins" picks
          # arm64 on Apple Silicon (Intel filtered arm64 out via hwreq).
          append_item() {
            local FEED="$1" ITEM_TMP="$2"
            awk -v item_file="$ITEM_TMP" '
              /<\/channel>/ {
                while ((getline line < item_file) > 0) print line
                close(item_file)
              }
              { print }
            ' "$FEED" > "$FEED.new"
            mv "$FEED.new" "$FEED"
          }

          ARM_DMG="Clipboard-${VERSION}-arm64.dmg"
          X86_DMG="Clipboard-${VERSION}-x86_64.dmg"
          # Per-arch feeds: one item each.
          strip_item docs/appcast-arm64.xml  "$ARM_DMG"; append_item docs/appcast-arm64.xml  "$ARM_TMP"
          strip_item docs/appcast-x86_64.xml "$X86_DMG"; append_item docs/appcast-x86_64.xml "$X86_TMP"
          # Merged feed (legacy <=1.0.4 installs poll this): both items,
          # arm64 first.
          strip_item docs/appcast.xml "$ARM_DMG"
          strip_item docs/appcast.xml "$X86_DMG"
          append_item docs/appcast.xml "$ARM_TMP"
          append_item docs/appcast.xml "$X86_TMP"

          FEEDS="docs/appcast.xml docs/appcast-arm64.xml docs/appcast-x86_64.xml"
          if git diff --quiet -- $FEEDS; then
            echo "appcasts unchanged, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $FEEDS
          git commit -m "appcast: publish v${VERSION} (arm64 + x86_64)"
          git push origin main
