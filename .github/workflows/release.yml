name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    # macos-26 ships Xcode 26 / macOS 26 SDK which is required to resolve
    # FoundationModels symbols at compile time. Runtime gating stays in
    # @available(macOS 26.0, *) so a single DMG runs on macOS 13+.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: |
          brew install just xcodegen swift-format

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sanity check project.yml version matches tag
        run: |
          # Match only the settings-level assignment (indented, followed by ":"),
          # not the Info.plist interpolation `$(MARKETING_VERSION)`.
          FILE_VER=$(awk '/^[[:space:]]+MARKETING_VERSION:[[:space:]]/ {gsub(/[" ]/, "", $2); print $2; exit}' project.yml)
          if [[ "$FILE_VER" != "${{ steps.ver.outputs.version }}" ]]; then
            echo "::error::project.yml MARKETING_VERSION ($FILE_VER) != tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Run tests
        run: just test

      - name: Lint
        run: just lint

      - name: Package DMG
        run: just package

      - name: Sign update with Sparkle
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not configured. Generate with 'just sparkle-keys', store the private key, add it to repo Secrets, and put the matching public key into project.yml/SUPublicEDKey."
            exit 1
          fi
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="dist/Clipboard-${VERSION}.dmg"
          # sign_update ships inside Sparkle's SPM binary artifact; 'just package'
          # already ran xcodebuild which populated build/SourcePackages.
          SIGN_UPDATE=$(find build/SourcePackages -name sign_update -type f -not -path "*old_dsa_scripts*" 2>/dev/null | head -1)
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "::error::sign_update not found under build/SourcePackages. Did 'just package' run?"
            exit 1
          fi
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          SIG_LINE=$("$SIGN_UPDATE" -f "$KEY_FILE" "$DMG")
          # sign_update prints e.g. `sparkle:edSignature="..." length="..."`
          echo "$SIG_LINE" > dist/sparkle-attrs.txt
          echo "sig_line=$SIG_LINE" >> "$GITHUB_OUTPUT"

      - name: Emit appcast snippet
        id: snippet
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="dist/Clipboard-${VERSION}.dmg"
          SIZE=$(stat -f%z "$DMG")
          SIG_LINE=$(cat dist/sparkle-attrs.txt)
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Clipboard-${VERSION}.dmg"
          PUBDATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')
          # sign_update already emits both sparkle:edSignature="..." and
          # length="..." attributes, so we must NOT append our own length=.
          cat > dist/appcast-item.xml <<ITEM
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUBDATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}" ${SIG_LINE} type="application/octet-stream" />
              </item>
          ITEM
          echo "## Appcast snippet" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```xml' >> "$GITHUB_STEP_SUMMARY"
          cat dist/appcast-item.xml >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Extract release notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag && /^\[[^]]+\]:/ {exit}
            flag {print}
          ' CHANGELOG.md > dist/release-notes.md
          cat .github/RELEASE_TEMPLATE.md dist/release-notes.md > dist/final-notes.md
          # Replace X.Y.Z placeholders in the template body
          sed -i '' "s/X\\.Y\\.Z/${VERSION}/g" dist/final-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          DMG="dist/Clipboard-${VERSION}.dmg"
          # Idempotent: if a release already exists at this tag (e.g. a
          # previous run succeeded partway), delete it first so we can
          # publish fresh artifacts. Keep the tag itself — it's what
          # triggered this run.
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release delete "v${VERSION}" --yes --cleanup-tag=false
          fi
          gh release create "v${VERSION}" \
            "${DMG}" "${DMG}.sha256" "dist/appcast-item.xml" \
            --title "Clipboard v${VERSION}" \
            --notes-file dist/final-notes.md

      - name: Publish appcast to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # Stash the generated item; switching branches would lose dist/.
          ITEM_TMP="$(mktemp)"
          cp dist/appcast-item.xml "$ITEM_TMP"

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          # Strip any existing <item> for this version so re-runs replace
          # (not duplicate / stale-sig) the entry. Sparkle's edSignature
          # is tied to the DMG bytes, so a rebuilt DMG needs a fresh item.
          awk -v ver="${VERSION}" '
            BEGIN { in_item = 0; buf = "" }
            /<item>/ { in_item = 1; buf = $0 ORS; next }
            in_item {
              buf = buf $0 ORS
              if ($0 ~ /<\/item>/) {
                if (buf !~ "<sparkle:version>" ver "</sparkle:version>") {
                  printf "%s", buf
                }
                in_item = 0; buf = ""
              }
              next
            }
            { print }
          ' docs/appcast.xml > docs/appcast.xml.stripped
          mv docs/appcast.xml.stripped docs/appcast.xml

          # Insert the fresh item immediately before </channel>.
          awk -v item_file="$ITEM_TMP" '
            /<\/channel>/ {
              while ((getline line < item_file) > 0) print line
              close(item_file)
            }
            { print }
          ' docs/appcast.xml > docs/appcast.xml.new
          mv docs/appcast.xml.new docs/appcast.xml

          if git diff --quiet docs/appcast.xml; then
            echo "docs/appcast.xml unchanged, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "appcast: publish v${VERSION}"
          git push origin main

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Clipboard-${{ steps.ver.outputs.version }}
          path: |
            dist/Clipboard-*.dmg
            dist/Clipboard-*.dmg.sha256
            dist/appcast-item.xml
